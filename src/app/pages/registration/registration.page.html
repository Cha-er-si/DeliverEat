<ion-content>
  <div class="register-container">
    <div class="register-header">
      <h5>Deliver<span>Eat</span></h5>
      <p>Bringing your cravings right at your doorstep!</p>
    </div>
    <div class="register-body">
      <div class="register-body-header">
        <div class="sign-up-container">
          <ion-icon name="people"></ion-icon>
          <h5>Sign Up</h5>
        </div>
      </div>
      <div class="register-body-content">
        <form [formGroup]="regForm" #form="ngForm">
          <div class="form-group">
            <ion-item lines="none">
              <ion-icon name="mail"></ion-icon>
              <ion-input
                label="Email"
                labelPlacement="floating"
                placeholder="example@example.com"
                formControlName="email"
              >
              </ion-input>
            </ion-item>
            <div class="validators-errors">
              <ng-container *ngFor="let validation of validationMessages.email">
                <div
                  class="error-message"
                  *ngIf="regForm.controls['email'].hasError(validation.type) && (regForm.controls['email'].dirty || regForm.controls['email'].touched)"
                >
                  <ion-icon
                    slot="start"
                    name="information-circle-outline"
                  ></ion-icon>
                  {{ validation.message }}
                </div>
              </ng-container>
            </div>
          </div>
          <div class="form-group">
            <ion-item lines="none">
              <ion-icon name="at-circle"></ion-icon>
              <ion-input
                label="Username"
                labelPlacement="floating"
                placeholder="Enter your username"
                formControlName="username"
              >
              </ion-input>
            </ion-item>
            <div class="validators-errors">
              <ng-container
                *ngFor="let validation of validationMessages.username"
              >
                <div
                  class="error-message"
                  *ngIf="regForm.controls['username'].hasError(validation.type) && (regForm.controls['username'].dirty || regForm.controls['username'].touched)"
                >
                  <ion-icon
                    slot="start"
                    name="information-circle-outline"
                  ></ion-icon>
                  {{ validation.message }}
                </div>
              </ng-container>
            </div>
          </div>
          <div class="form-group">
            <ion-item lines="none">
              <app-password-toggle-show-hide>
                <ion-icon name="lock-closed"></ion-icon>
                <ion-input
                  label="Password"
                  labelPlacement="floating"
                  placeholder="Enter your password"
                  type="password"
                  formControlName="password"
                ></ion-input>
              </app-password-toggle-show-hide>
            </ion-item>
            <div class="validators-errors">
              <ng-container
                *ngFor="let validation of validationMessages.password"
              >
                <div
                  class="error-message"
                  *ngIf="regForm.controls['password'].hasError(validation.type) && (regForm.controls['password'].dirty || regForm.controls['password'].touched)"
                >
                  <ion-icon
                    slot="start"
                    name="information-circle-outline"
                  ></ion-icon>
                  {{ validation.message }}
                </div>
              </ng-container>
            </div>
          </div>
          <div class="form-group">
            <ion-item lines="none">
              <app-password-toggle-show-hide>
                <ion-icon name="lock-closed"></ion-icon>
                <ion-input
                  label="Confirm Password"
                  labelPlacement="floating"
                  placeholder=""
                  type="password"
                  formControlName="confirmpass"
                ></ion-input>
              </app-password-toggle-show-hide>
            </ion-item>
            <div class="validators-errors">
              <ng-container
                *ngFor="let validation of validationMessages.confirmpass"
              >
                <div
                  class="error-message"
                  *ngIf="regForm.controls['confirmpass'].hasError(validation.type) && (regForm.controls['confirmpass'].dirty || regForm.controls['confirmpass'].touched)"
                >
                  <ion-icon
                    slot="start"
                    name="information-circle-outline"
                  ></ion-icon>
                  {{ validation.message }}
                </div>
              </ng-container>
            </div>
          </div>
          <div class="buttons">
            <ion-button expand="block" (click)="register()">SIGN UP</ion-button>
            <div class="line"></div>
            <div class="other-sign-up">
              <ion-button expand="block">
                <ion-icon name="logo-google"></ion-icon> SIGN UP USING
                GOOGLE</ion-button
              >
              <ion-button expand="block">
                <ion-icon name="logo-facebook"></ion-icon> SIGN UP USING
                FACEBOOK</ion-button
              >
            </div>
          </div>
          <p class="sign-in">
            Already have an account?
            <span routerLink="/login">Sign In</span>
          </p>
        </form>
      </div>
    </div>
  </div>
</ion-content>
